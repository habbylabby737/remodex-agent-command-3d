<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; img-src data:; font-src 'none'; connect-src 'none'; media-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none'; frame-src 'none'; manifest-src 'none'; worker-src 'none'; upgrade-insecure-requests">

  <title>Remodex Agent Command</title>
  <style>
    :root {
      --rx: -7deg;
      --ry: -18deg;
      --zoom: -210px;
      --blue: #284cff;
      --violet: #7762ff;
      --cyan: #6be7ff;
      --ink: #080a11;
      --soft: #f6f8ff;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #f8faff;
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
      touch-action: none;
    }

    .viewer {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      overflow: hidden;
      perspective: 1260px;
      isolation: isolate;
      cursor: grab;
      background:
        radial-gradient(circle at 16% 28%, rgba(65, 95, 255, .17), transparent 22%),
        radial-gradient(circle at 74% 18%, rgba(121, 96, 255, .18), transparent 21%),
        radial-gradient(ellipse at 50% 92%, rgba(61, 91, 255, .16), transparent 37%),
        linear-gradient(180deg, #fff 0%, #f8faff 46%, #eaf0ff 100%);
    }

    .viewer:active {
      cursor: grabbing;
    }

    #meshCanvas,
    #agentCanvas,
    .paper-grain,
    .light-sweep,
    .side-glow {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    #meshCanvas {
      z-index: 0;
      opacity: .92;
    }

	    #agentCanvas {
	      z-index: 4;
	      opacity: .52;
	    }

    .paper-grain {
      z-index: 1;
      opacity: .32;
      background-image:
        linear-gradient(rgba(42, 73, 255, .055) 1px, transparent 1px),
        linear-gradient(90deg, rgba(42, 73, 255, .04) 1px, transparent 1px);
      background-size: 64px 64px;
      mask-image: radial-gradient(circle at 50% 40%, rgba(0, 0, 0, .8), transparent 74%);
    }

    .side-glow {
      z-index: 2;
      background:
        radial-gradient(ellipse at 5% 100%, rgba(44, 78, 255, .34), transparent 39%),
        radial-gradient(ellipse at 96% 100%, rgba(78, 65, 255, .34), transparent 37%),
        radial-gradient(ellipse at 50% 102%, rgba(107, 231, 255, .3), transparent 31%);
      filter: blur(8px);
    }

    .light-sweep {
      z-index: 3;
      background:
        linear-gradient(112deg, transparent 18%, rgba(255, 255, 255, .48) 41%, transparent 58%),
        linear-gradient(60deg, transparent 20%, rgba(102, 126, 255, .09), transparent 72%);
      transform: translateX(-35%) skewX(-8deg);
      animation: sweep 7s ease-in-out infinite;
      opacity: .58;
    }

    .scene {
      position: relative;
      z-index: 5;
      width: min(94vw, 1280px);
      height: min(78vh, 690px);
      display: grid;
      place-items: center;
      transform-style: preserve-3d;
    }

	    .rig {
	      position: relative;
	      width: min(94vw, 1190px);
	      height: min(56vw, 560px);
	      min-height: 390px;
	      transform-style: preserve-3d;
	      transform: translateZ(var(--zoom)) rotateX(var(--rx)) rotateY(var(--ry));
	      backface-visibility: hidden;
	      contain: layout paint style;
	      will-change: transform;
	    }

    .depth-object,
    .hero-card,
    .glass-rim,
    .orbital,
    .command-orb,
    .word-stack,
    .plinth,
    .agent-node,
    .terminal-strip,
    .data-pane {
      position: absolute;
      transform-style: preserve-3d;
    }

    .plinth {
      left: 12%;
      bottom: 1%;
      width: 76%;
      height: 118px;
      border-radius: 50%;
      background:
        radial-gradient(ellipse at center, rgba(55, 88, 255, .16), rgba(55, 88, 255, .06) 34%, transparent 70%),
        radial-gradient(ellipse at center, rgba(255, 255, 255, .94), transparent 62%);
      box-shadow: 0 18px 58px rgba(27, 52, 155, .16);
      transform: translateZ(-190px) rotateX(78deg);
    }

	    .hero-card {
      left: 5%;
      top: 6%;
      width: 90%;
      height: 76%;
      border-radius: 42px;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, .72), rgba(255, 255, 255, .26) 48%, rgba(230, 237, 255, .34)),
        radial-gradient(circle at 25% 28%, rgba(111, 231, 255, .19), transparent 28%),
        linear-gradient(120deg, rgba(111, 231, 255, .16), transparent 48%, rgba(111, 90, 255, .16));
      border: 1px solid rgba(96, 112, 180, .2);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, .9),
        inset 0 -52px 86px rgba(74, 91, 196, .09),
        0 48px 118px rgba(50, 66, 150, .19);
	      overflow: hidden;
	      transform: translateZ(-118px) rotateX(2deg);
	      backface-visibility: hidden;
	    }

    .hero-card::before {
      content: "";
      position: absolute;
      inset: -28%;
      background:
        repeating-linear-gradient(90deg, rgba(72, 97, 255, .13) 0 1px, transparent 1px 42px),
        repeating-linear-gradient(0deg, rgba(72, 97, 255, .08) 0 1px, transparent 1px 42px);
      transform: rotate(12deg);
      opacity: .34;
    }

	    .hero-card::after {
      content: "";
      position: absolute;
      inset: 0;
	      background:
	        radial-gradient(circle at 22% 34%, rgba(255, 255, 255, .86), transparent 18%),
	        linear-gradient(100deg, transparent 28%, rgba(255, 255, 255, .56), transparent 48%);
	      transform: translateX(-120%) skewX(-18deg);
	      animation: glassFlash 11s ease-in-out infinite;
	      opacity: .58;
	    }

    .glass-rim {
      left: 9%;
      top: 14%;
      width: 78%;
      height: 54%;
      border: 1px solid rgba(79, 100, 190, .2);
      border-radius: 999px;
      transform: translateZ(-76px) rotateX(66deg) rotateZ(-8deg);
      box-shadow:
        inset 0 0 34px rgba(65, 90, 255, .12),
        0 0 58px rgba(62, 88, 255, .08);
      opacity: .84;
    }

    .glass-rim::before,
    .glass-rim::after {
      content: "";
      position: absolute;
      inset: 12%;
      border-radius: inherit;
      border: 1px dashed rgba(68, 91, 255, .22);
    }

    .glass-rim::after {
      inset: 30%;
      border-color: rgba(107, 231, 255, .22);
      border-style: solid;
    }

	    .orbital {
      left: 6%;
      top: -7%;
      width: 43%;
      aspect-ratio: 1;
      border-radius: 50%;
      border: 2px solid rgba(67, 88, 235, .24);
      transform: translateZ(-42px) rotateX(72deg) rotateZ(18deg);
      box-shadow:
        inset 0 0 58px rgba(60, 90, 255, .14),
        0 0 70px rgba(83, 98, 255, .2);
	      animation: orbitRing 26s linear infinite;
	      backface-visibility: hidden;
	    }

    .orbital::before,
    .orbital::after {
      content: "";
      position: absolute;
      inset: 10%;
      border-radius: inherit;
      border: 2px dotted rgba(67, 88, 235, .28);
    }

    .orbital::after {
      inset: -10%;
      border: 1px solid rgba(107, 231, 255, .2);
      transform: translateZ(-18px) rotateZ(34deg);
    }

	    .command-orb {
	      left: 9%;
	      top: 1%;
	      width: 39%;
	      height: 88%;
	      transform: translateZ(84px) rotateY(-7deg) rotateX(2deg);
	      backface-visibility: hidden;
	      will-change: transform;
	    }

	    .command-orb::before {
      content: "";
      position: absolute;
      left: 2%;
      top: 5%;
      width: 96%;
      height: 88%;
      border-radius: 50%;
      background:
        radial-gradient(circle at 36% 26%, rgba(255, 255, 255, .72), transparent 20%),
	        radial-gradient(circle at 58% 54%, rgba(107, 231, 255, .28), transparent 42%),
	        radial-gradient(circle at 50% 50%, rgba(60, 82, 255, .2), transparent 62%);
	      transform: translateZ(52px) scale(1.05);
	      opacity: .88;
	      pointer-events: none;
	    }

	    .command-orb::after {
      content: "";
      position: absolute;
      left: 5%;
      top: 6%;
      width: 90%;
      height: 84%;
      border-radius: 48%;
      background:
        repeating-linear-gradient(118deg, rgba(255, 255, 255, .22) 0 2px, transparent 2px 18px),
        linear-gradient(118deg, transparent, rgba(255, 255, 255, .55), transparent 52%);
	      transform: translateZ(145px) rotate(-8deg);
	      clip-path: path("M118 18C66 18 30 50 30 93c0 18 5 34 15 48l-14 51 54-24c10 4 22 5 34 5 54 0 94-35 94-78 0-45-41-77-95-77Z");
	      opacity: .46;
	      pointer-events: none;
	      animation: orbCaustic 9s ease-in-out infinite alternate;
	    }

    .icon-glass {
      position: absolute;
      inset: 0;
      transform-style: preserve-3d;
    }

	    .tile-layer,
	    .bubble-layer {
      position: absolute;
      inset: 0;
	      transform-style: preserve-3d;
	      transform: translateZ(var(--z));
	      backface-visibility: hidden;
	    }

    .tile-layer {
      left: 12%;
      top: 9%;
      width: 76%;
      height: 78%;
      border-radius: 34%;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, calc(var(--a) + .18)), rgba(255, 255, 255, var(--a))),
        radial-gradient(circle at 32% 18%, rgba(107, 231, 255, .18), transparent 34%);
      border: 1px solid rgba(75, 93, 170, var(--b));
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, .92),
        inset 0 -18px 35px rgba(72, 92, 210, .06),
        0 8px 22px rgba(44, 63, 150, .1);
    }

    .bubble-layer svg {
      width: 100%;
      height: 100%;
      display: block;
      overflow: visible;
      opacity: .92;
    }

    .bubble-layer path {
      fill: var(--fill);
      stroke: rgba(255, 255, 255, var(--stroke));
      stroke-width: var(--sw);
      vector-effect: non-scaling-stroke;
    }

	    .bubble-edge {
	      opacity: .9;
	    }

	    .bubble-face path {
	      fill: url(#bubbleGradient);
	      stroke: rgba(255, 255, 255, .78);
	      stroke-width: 6;
	    }

	    .bubble-highlight {
      position: absolute;
      left: 14%;
      top: 9%;
      width: 72%;
      height: 70%;
      border-radius: 50%;
      transform: translateZ(116px);
      background:
        radial-gradient(circle at 36% 20%, rgba(255, 255, 255, .86), transparent 20%),
        radial-gradient(circle at 70% 70%, rgba(107, 231, 255, .28), transparent 28%),
        linear-gradient(132deg, rgba(255, 255, 255, .52), transparent 36%);
	      clip-path: path("M118 18C66 18 30 50 30 93c0 18 5 34 15 48l-14 51 54-24c10 4 22 5 34 5 54 0 94-35 94-78 0-45-41-77-95-77Z");
	      opacity: .62;
	      pointer-events: none;
	    }

	    .bubble-lens {
      position: absolute;
      left: 14%;
      top: 9%;
      width: 72%;
      height: 70%;
      border-radius: 50%;
      transform: translateZ(138px);
      clip-path: path("M118 18C66 18 30 50 30 93c0 18 5 34 15 48l-14 51 54-24c10 4 22 5 34 5 54 0 94-35 94-78 0-45-41-77-95-77Z");
      background:
        radial-gradient(circle at 36% 22%, rgba(255, 255, 255, .52), transparent 18%),
        repeating-linear-gradient(102deg, rgba(255, 255, 255, .16) 0 2px, transparent 2px 17px),
        linear-gradient(122deg, rgba(255, 255, 255, .34), transparent 42%, rgba(107, 231, 255, .22));
      box-shadow:
        inset 0 0 38px rgba(255, 255, 255, .38),
        inset 0 -28px 54px rgba(38, 70, 255, .16);
	      opacity: .68;
	      pointer-events: none;
	      animation: lensShift 10s ease-in-out infinite alternate;
	    }

    .terminal-mark {
      position: absolute;
      left: 33%;
      top: 37%;
      transform-style: preserve-3d;
      transform: translateZ(154px);
      color: #fff;
      font: 900 clamp(54px, 6.6vw, 88px)/.8 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      letter-spacing: -.07em;
      text-shadow:
        0 2px 0 rgba(255, 255, 255, .26),
        0 10px 18px rgba(27, 37, 120, .26),
        0 0 26px rgba(255, 255, 255, .38);
      user-select: none;
    }

    .terminal-mark::before,
    .terminal-mark::after {
      content: ">_";
      position: absolute;
      inset: 0;
      transform: translateZ(-18px) translate(7px, 7px);
      color: rgba(198, 212, 255, .38);
      z-index: -1;
    }

    .terminal-mark::after {
      transform: translateZ(-34px) translate(14px, 14px);
      color: rgba(87, 96, 214, .22);
    }

	    .word-stack {
	      left: 47%;
	      top: 22%;
	      width: 47%;
	      transform: translateZ(98px) rotateY(3deg);
	      backface-visibility: hidden;
	      will-change: transform;
	    }

    .word-depth,
    .word-front,
    .tag-depth,
    .tag-front {
      position: absolute;
      left: 0;
      white-space: nowrap;
      letter-spacing: 0;
      user-select: none;
      transform-style: preserve-3d;
    }

    .word-depth,
    .word-front {
      top: 0;
      color: var(--ink);
      font-size: clamp(62px, 7.8vw, 108px);
      font-weight: 740;
      line-height: .95;
    }

    .tag-depth,
    .tag-front {
      top: clamp(82px, 9vw, 124px);
      color: #555c6c;
      font-size: clamp(18px, 2.3vw, 32px);
      font-weight: 470;
      line-height: 1.1;
    }

    .word-depth,
    .tag-depth {
      color: rgba(72, 78, 100, .16);
      text-shadow: 0 8px 18px rgba(67, 83, 169, .1);
    }

    .tag-depth {
      color: rgba(72, 78, 100, .08);
      text-shadow: none;
    }

    .word-front,
    .tag-front {
      transform: translateZ(70px);
    }

    .word-front {
      text-shadow:
        0 1px 0 rgba(255, 255, 255, .74),
        0 18px 26px rgba(55, 70, 150, .13);
    }

    .tag-front {
      color: rgba(61, 68, 84, .86);
      text-shadow: 0 10px 18px rgba(55, 70, 150, .08);
    }

	    .word-shine {
      position: absolute;
      left: -2%;
      top: -8px;
      width: 105%;
      height: clamp(64px, 7.5vw, 112px);
	      transform: translateZ(74px) translateX(-120%) skewX(-14deg);
	      background: linear-gradient(105deg, transparent 0 36%, rgba(255, 255, 255, .75) 47%, transparent 59% 100%);
	      opacity: .72;
	      pointer-events: none;
	      animation: wordShine 10s ease-in-out infinite;
	    }

    .terminal-strip {
      left: 48%;
      top: 63%;
      width: 38%;
      height: 62px;
      border-radius: 18px;
      background:
        linear-gradient(135deg, rgba(8, 10, 17, .9), rgba(24, 29, 55, .76)),
        linear-gradient(90deg, rgba(46, 79, 255, .28), rgba(107, 231, 255, .12));
      color: rgba(237, 244, 255, .92);
      border: 1px solid rgba(255, 255, 255, .44);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, .18),
        0 24px 42px rgba(37, 51, 130, .18);
      transform: translateZ(54px) rotateX(4deg);
      overflow: hidden;
    }

    .terminal-strip::before {
      content: "remodex://agent-relay";
      position: absolute;
      left: 22px;
      top: 20px;
      font: 750 15px/1 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      letter-spacing: 0;
    }

	    .terminal-strip::after {
      content: "";
      position: absolute;
      right: 22px;
      top: 23px;
      width: 68px;
      height: 9px;
      border-radius: 999px;
	      background:
	        linear-gradient(90deg, #6be7ff, #fff, #6877ff);
	      box-shadow: 0 0 18px rgba(107, 231, 255, .74);
	      opacity: .86;
	      animation: pulse 3.8s ease-in-out infinite alternate;
	    }

	    .command-beam {
      position: absolute;
      left: 38%;
      top: 39%;
      width: 40%;
      height: 92px;
      border-radius: 999px;
      border-top: 1px solid rgba(107, 231, 255, .34);
      border-bottom: 1px solid rgba(49, 84, 255, .1);
	      background:
	        linear-gradient(90deg, rgba(49, 84, 255, .2), rgba(107, 231, 255, .2), transparent 76%);
	      transform: translateZ(26px) rotateZ(-3deg) skewX(-12deg);
	      opacity: .55;
	      pointer-events: none;
	    }

    .command-beam::before,
    .command-beam::after {
      content: "";
      position: absolute;
      left: 0;
      right: 15%;
      height: 1px;
      background: linear-gradient(90deg, rgba(49, 84, 255, .42), rgba(107, 231, 255, .36), transparent);
    }

    .command-beam::before {
      top: 28px;
    }

    .command-beam::after {
      bottom: 24px;
    }

    .data-pane {
      width: 152px;
      height: 96px;
      border-radius: 22px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, .68), rgba(255, 255, 255, .18)),
        linear-gradient(90deg, rgba(43, 75, 255, .16), rgba(107, 231, 255, .08));
      border: 1px solid rgba(78, 96, 185, .2);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, .78),
        0 22px 34px rgba(42, 61, 150, .11);
      transform: translateZ(var(--z)) rotateY(var(--y)) rotateX(var(--x)) rotateZ(var(--r));
      opacity: .76;
      overflow: hidden;
    }

	    .glass-shard {
      position: absolute;
      width: 112px;
      height: 166px;
      border-radius: 26px;
      background:
        linear-gradient(132deg, rgba(255, 255, 255, .68), rgba(255, 255, 255, .16) 42%, rgba(107, 231, 255, .12)),
        linear-gradient(90deg, rgba(49, 84, 255, .08), transparent);
      border: 1px solid rgba(255, 255, 255, .62);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, .88),
        0 24px 46px rgba(42, 61, 150, .12);
	      transform: translateZ(var(--z)) rotateY(var(--y)) rotateX(var(--x)) rotateZ(var(--r));
	      opacity: .68;
	      pointer-events: none;
	      backface-visibility: hidden;
	    }

    .shard-a {
      left: 3%;
      top: 27%;
      --z: 30px;
      --x: 8deg;
      --y: -22deg;
      --r: -13deg;
    }

    .shard-b {
      right: 5%;
      top: 29%;
      width: 86px;
      height: 126px;
      --z: 18px;
      --x: 9deg;
      --y: 28deg;
      --r: 12deg;
    }

    .shard-c {
      left: 34%;
      top: 4%;
      width: 132px;
      height: 78px;
      --z: -8px;
      --x: 58deg;
      --y: 0deg;
      --r: -9deg;
      opacity: .42;
    }

    .data-pane::before {
      content: "";
      position: absolute;
      left: 18px;
      top: 18px;
      width: 64%;
      height: 10px;
      border-radius: 999px;
      background: rgba(50, 75, 255, .22);
      box-shadow:
        0 22px 0 rgba(50, 75, 255, .12),

    }

    .data-pane::after {
      content: "";
      position: absolute;

      height: 22px;
      border-radius: 50%;
      background: #3154ff;
      box-shadow: 0 0 0 9px rgba(49, 84, 255, .1), 0 0 24px rgba(49, 84, 255, .4);
    }

    .pane-a {
      right: 8%;

      --z: -22px;
      --x: 8deg;
      --y: -30deg;
      --r: 8deg;
    }

    .pane-b {

      --z: -16px;

        0 0 44px rgba(107, 231, 255, .28);
      transform: translate3d(var(--x), var(--y), var(--z));
      animation: nodeDrift var(--speed) ease-in-out infinite alternate;
    }

    .agent-node::after {
      content: "";
      position: absolute;
      top: 8px;
      left: 8px;
      width: var(--line);
      height: 1px;
      background: linear-gradient(90deg, rgba(49, 84, 255, .5), transparent);
      transform: rotate(var(--angle));
      transform-origin: left center;
    }

    .node-a {
      --x: 4vw;
      --y: 34px;
      --z: 18px;
      --line: 155px;
      --angle: 21deg;
      --speed: 3.8s;
    }

    .node-b {
      --x: 82vw;
      --y: 72px;
      --z: -26px;
      --line: 142px;
      --angle: 154deg;
      --speed: 4.4s;
    }

    .node-c {
      --x: 69vw;
      --y: 358px;
      --z: 36px;
      --line: 120px;
      --angle: 218deg;
      --speed: 3.3s;
    }

    .node-d {
      --x: 43vw;
      --y: 112px;
      --z: 74px;
      --line: 92px;
      --angle: 130deg;
      --speed: 3.9s;

    }

    .controls {
      position: fixed;
      right: 20px;
      bottom: 18px;
      z-index: 7;
      width: min(620px, calc(100vw - 40px));
      display: grid;
      grid-template-columns: auto 1fr 1fr;
      gap: 12px;
      align-items: stretch;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid rgba(75, 93, 170, .18);
      background: rgba(255, 255, 255, .52);
      box-shadow: 0 18px 52px rgba(42, 61, 150, .14);

      gap: 8px;

      border: 1px solid rgba(64, 84, 180, .18);
      background: rgba(255, 255, 255, .72);
      color: #151722;
      cursor: pointer;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .8);
    }

    .control-button {
      min-width: 92px;
      height: 36px;
      border-radius: 9px;
      font: 760 12px/1 system-ui, sans-serif;
    }

    .control-button:hover,
    .quick-button:hover,
    .step-button:hover {
      background: #fff;
    }

    .control-button[aria-pressed="true"] {
      background: rgba(49, 84, 255, .12);
      border-color: rgba(49, 84, 255, .3);
      box-shadow: 0 0 24px rgba(49, 84, 255, .18);
    }

    .orbit-button {
      position: relative;
      min-width: 116px;
      height: 44px;
      overflow: hidden;
      color: #fff;
      border-color: rgba(255, 255, 255, .74);
      background:
        linear-gradient(135deg, rgba(255, 255, 255, .34), rgba(255, 255, 255, .12) 42%, rgba(107, 231, 255, .16)),
        linear-gradient(135deg, #3054ff 0%, #625fff 54%, #7f73ff 100%);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, .7),
        0 14px 34px rgba(49, 84, 255, .28),
        0 0 28px rgba(107, 231, 255, .2);
      text-shadow: 0 1px 7px rgba(0, 0, 0, .24);
    }

    .orbit-button::before {
      content: "";
      position: absolute;
      inset: -45% -70%;
      background: linear-gradient(110deg, transparent 39%, rgba(255, 255, 255, .72) 50%, transparent 61%);
      transform: translateX(-38%) rotate(8deg);
      pointer-events: none;
      opacity: .62;
    }

    .orbit-button[aria-pressed="true"]::before {
      animation: orbitButtonShine 1.35s ease-in-out infinite;
    }

    .control-group {
      display: grid;
      grid-template-columns: 50px 1fr 52px;
      align-items: center;
      gap: 8px;
      min-width: 0;
      color: #293044;
      font: 760 12px/1 system-ui, sans-serif;
    }

    .control-group output {
      color: #11131b;
      font-variant-numeric: tabular-nums;
      text-align: right;
    }

    .quick-row,
    .stepper-row,
    .range-wrap {
      display: flex;
      gap: 6px;
      min-width: 0;
      align-items: center;
    }

    .quick-button,
    .step-button {
      height: 28px;
      border-radius: 8px;
      font: 760 11px/1 system-ui, sans-serif;
    }

    .quick-button {
      flex: 1;
      min-width: 0;
    }

    .step-button {
      width: 34px;
      flex: 0 0 34px;
    }

    input[type="range"] {
      width: 100%;
      min-width: 0;
      accent-color: #3154ff;
    }

    @keyframes sweep {
      0%, 36% {
        transform: translateX(-45%) skewX(-8deg);
      }
      72%, 100% {
        transform: translateX(45%) skewX(-8deg);
      }
    }

    @keyframes glassFlash {
      50%, 100% {
        transform: translateX(120%) skewX(-18deg);
      }
    }

    @keyframes orbitRing {
      to {
        transform: translateZ(-42px) rotateX(72deg) rotateZ(378deg);
      }
    }

    @keyframes wordShine {
      0%, 45% {
        transform: translateZ(74px) translateX(-120%) skewX(-14deg);
      }
      66%, 100% {
        transform: translateZ(74px) translateX(130%) skewX(-14deg);
      }
    }

	    @keyframes pulse {
	      from {
	        transform: scaleX(.75);
	      }
	      to {
	        transform: scaleX(1);
	      }
	    }

	    @keyframes orbCaustic {
	      from {
	        transform: translateZ(145px) rotate(-10deg) translateX(-10px);
	      }
	      to {
	        transform: translateZ(145px) rotate(-4deg) translateX(12px);
	      }
	    }

    @keyframes lensShift {
      from {
        transform: translateZ(138px) translateX(-8px) rotate(-4deg);
      }
      to {
        transform: translateZ(138px) translateX(10px) rotate(3deg);
      }
    }

    @keyframes nodeDrift {
      to {
        transform: translate3d(calc(var(--x) + 18px), calc(var(--y) - 16px), calc(var(--z) + 28px));
      }
    }

    @keyframes orbitButtonShine {
      from {
        transform: translateX(-58%) rotate(8deg);
      }
      to {
        transform: translateX(58%) rotate(8deg);
      }
    }

	    @media (max-width: 760px) {
	      .viewer {
	        perspective: 980px;
	      }

	      .scene {
	        width: 100vw;
	        height: calc(100svh - 292px);
	        min-height: 430px;
	        align-self: start;
	        place-items: start center;
	      }

	      .rig {
	        width: min(104vw, 540px);
	        height: 430px;
	        min-height: 430px;
	        margin-top: -6px;
	      }

	      .hero-card {
	        left: 4%;
	        top: 10%;
	        width: 92%;
	        height: 66%;
	        border-radius: 28px;
	      }

	      .command-orb {
	        left: 27%;
	        top: 4%;
	        width: 46%;
	        height: 40%;
	      }

	      .word-stack {
	        left: 8%;
	        top: 47%;
	        width: 84%;
	        text-align: center;
	      }

	      .word-depth,
	      .word-front {
	        width: 100%;
	        font-size: clamp(44px, 14vw, 58px);
	      }

	      .tag-depth,
	      .tag-front {
	        width: 100%;
	        top: clamp(50px, 16vw, 68px);
	        font-size: clamp(13px, 4.3vw, 18px);
	      }

	      .terminal-strip {
	        left: 12%;
	        top: 72%;
	        width: 76%;
	        height: 46px;
	        border-radius: 14px;
	      }

	      .terminal-strip::before {
	        left: 16px;
	        top: 16px;
	        font-size: 11px;
	      }

	      .terminal-strip::after {
	        right: 14px;
	        top: 18px;
	        width: 46px;
	        height: 7px;
	      }

	      .orbital {
	        left: 15%;
        top: 2%;
        width: 70%;
      }

      .glass-rim,
      .pane-a,
      .pane-b,
      .node-a,
      .node-b,
      .node-c {
        opacity: .45;
      }

	      .controls {
	        left: 10px;
	        right: auto;
	        bottom: 10px;
	        width: min(370px, calc(100vw - 20px));
	        max-width: 370px;
	        grid-template-columns: minmax(0, 1fr);
	        gap: 8px;
	        padding: 10px;
	        border-radius: 10px;
	      }

	      .controls > * {
	        min-width: 0;
	      }

	      .control-actions {
	        display: grid;
	        grid-template-columns: repeat(3, minmax(0, 1fr));
	        gap: 6px;
	      }

	      .control-column {
	        gap: 6px;
	      }

	      .control-button {
	        width: 100%;
	        min-width: 0;
	        height: 32px;
	      }

	      .orbit-button {

	      }

	      .control-group {
	        grid-template-columns: 50px minmax(0, 1fr) 44px;

	        font-size: 10px;
	      }

	        flex-basis: 30px;
	      }
	    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: .01ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
      }
    }

</head>
<body>
  <main class="viewer" id="viewer" aria-label="Interactive 3D Remodex command sculpture">
    <canvas id="meshCanvas" aria-hidden="true"></canvas>
    <canvas id="agentCanvas" aria-hidden="true"></canvas>
    <div class="paper-grain" aria-hidden="true"></div>
    <div class="side-glow" aria-hidden="true"></div>
    <div class="light-sweep" aria-hidden="true"></div>

    <section class="scene" aria-label="Remodex 3D scene">
      <div class="rig" id="rig">
        <div class="plinth"></div>
        <div class="glass-rim"></div>
        <div class="orbital"></div>
        <div class="glass-shard shard-a"></div>
        <div class="glass-shard shard-b"></div>
        <div class="glass-shard shard-c"></div>
        <div class="agent-node node-a"></div>
        <div class="agent-node node-b"></div>
        <div class="agent-node node-c"></div>
        <div class="agent-node node-d"></div>
        <div class="data-pane pane-a"></div>
        <div class="data-pane pane-b"></div>
        <div class="hero-card"></div>
        <div class="command-beam"></div>

        <div class="command-orb" id="commandOrb" aria-hidden="true">
          <div class="icon-glass" id="iconGlass"></div>
          <div class="bubble-highlight"></div>
          <div class="bubble-lens"></div>
          <div class="terminal-mark">&gt;_</div>
        </div>

        <div class="word-stack" aria-label="Remodex Control your Agents from anywhere">
          <div class="word-depth" style="transform: translateZ(0px) translate(18px, 18px);">Remodex</div>
          <div class="word-depth" style="transform: translateZ(14px) translate(13px, 13px);">Remodex</div>
          <div class="word-depth" style="transform: translateZ(28px) translate(8px, 8px);">Remodex</div>
          <div class="word-depth" style="transform: translateZ(42px) translate(4px, 4px);">Remodex</div>
          <div class="word-front">Remodex</div>
          <div class="word-shine"></div>

          <div class="tag-depth" style="transform: translateZ(8px) translate(10px, 10px);">Control your Agents from anywhere</div>
          <div class="tag-depth" style="transform: translateZ(24px) translate(5px, 5px);">Control your Agents from anywhere</div>
          <div class="tag-front">Control your Agents from anywhere</div>
        </div>

        <div class="terminal-strip"></div>
      </div>
    </section>

    <div class="controls" aria-label="Scene controls">
      <div class="control-actions">
        <button class="control-button" id="frontButton" type="button">Front</button>
        <button class="control-button" id="spinButton" type="button">Pause</button>
        <button class="control-button orbit-button" id="orbitButton" type="button" aria-pressed="false">360 Orbit</button>
      </div>

      <div class="control-column">
        <label class="control-group">
          <span>Speed</span>
          <input id="speedRange" type="range" min="12" max="210" value="62" step="1" aria-label="Spin speed">
          <output id="speedValue" for="speedRange">62%</output>
        </label>
        <div class="quick-row" aria-label="Speed presets">
          <button class="quick-button" type="button" data-speed="34">Slow</button>
          <button class="quick-button" type="button" data-speed="62">Show</button>
          <button class="quick-button" type="button" data-speed="116">Fast</button>
        </div>
        <label class="control-group">
          <span>Sweep</span>
          <input id="sweepRange" type="range" min="4" max="36" value="16" step="1" aria-label="Spin sweep">
          <output id="sweepValue" for="sweepRange">16 deg</output>
        </label>
      </div>

      <div class="control-column">
        <label class="control-group">
          <span>Zoom</span>
          <span class="range-wrap">
            <button class="step-button" id="zoomOutButton" type="button" aria-label="Zoom out">-</button>
            <input id="zoomRange" type="range" min="-430" max="120" value="-210" step="1" aria-label="Zoom">
            <button class="step-button" id="zoomInButton" type="button" aria-label="Zoom in">+</button>
          </span>
          <output id="zoomValue" for="zoomRange">-210</output>
        </label>
        <div class="quick-row" aria-label="Zoom presets">
          <button class="quick-button" type="button" data-zoom="-320">Wide</button>
          <button class="quick-button" type="button" data-zoom="-210">Fit</button>
          <button class="quick-button" type="button" data-zoom="-65">Close</button>
        </div>
        <label class="control-group">
          <span>Tilt</span>
          <input id="tiltRange" type="range" min="-14" max="9" value="-4" step="1" aria-label="Tilt">
          <output id="tiltValue" for="tiltRange">-4 deg</output>
        </label>
      </div>
    </div>
  </main>

  <script>
    (() => {
      const bubblePath = "M118 18C66 18 30 50 30 93c0 18 5 34 15 48l-14 51 54-24c10 4 22 5 34 5 54 0 94-35 94-78 0-45-41-77-95-77Z";
      const iconGlass = document.getElementById("iconGlass");
      const ns = "http://www.w3.org/2000/svg";
      const clamp = (value, min, max) => Math.max(min, Math.min(max, value));

      for (let i = 18; i >= 0; i -= 1) {
        const tile = document.createElement("div");
        tile.className = "tile-layer";
        tile.style.setProperty("--z", `${16 - i * 3.8}px`);
        tile.style.setProperty("--a", `${(0.18 + (18 - i) * 0.025).toFixed(3)}`);
        tile.style.setProperty("--b", `${(0.06 + (18 - i) * 0.013).toFixed(3)}`);
        iconGlass.appendChild(tile);
      }

      for (let i = 20; i >= 0; i -= 1) {
        const svg = document.createElementNS(ns, "svg");
        svg.setAttribute("viewBox", "0 0 240 220");
        svg.setAttribute("class", i === 0 ? "bubble-layer bubble-face" : "bubble-layer bubble-edge");
        svg.style.setProperty("--z", `${104 - i * 4.4}px`);
        const t = i / 20;
        svg.style.setProperty("--fill", `rgba(${42 + Math.round(36 * (1 - t))}, ${74 + Math.round(20 * (1 - t))}, 255, ${(0.2 + (1 - t) * 0.2).toFixed(3)})`);
        svg.style.setProperty("--stroke", i === 0 ? ".66" : ".1");
        svg.style.setProperty("--sw", i === 0 ? "5" : "2");
        if (i === 0) {
          const defs = document.createElementNS(ns, "defs");
          const gradient = document.createElementNS(ns, "radialGradient");
          gradient.setAttribute("id", "bubbleGradient");
          gradient.setAttribute("cx", "34%");
          gradient.setAttribute("cy", "20%");
          gradient.setAttribute("r", "82%");
          [["0", "#dce5ff", ".46"], [".24", "#9dadff", ".56"], [".58", "#3154ff", ".68"], ["1", "#1438ef", ".62"]].forEach(([offset, color, opacity]) => {
            const stop = document.createElementNS(ns, "stop");
            stop.setAttribute("offset", offset);
            stop.setAttribute("stop-color", color);
            stop.setAttribute("stop-opacity", opacity);
            gradient.appendChild(stop);
          });
          defs.appendChild(gradient);
          svg.appendChild(defs);
        }
        const path = document.createElementNS(ns, "path");
        path.setAttribute("d", bubblePath);
        svg.appendChild(path);
        iconGlass.appendChild(svg);
      }

      const viewer = document.getElementById("viewer");
      const frontButton = document.getElementById("frontButton");
      const spinButton = document.getElementById("spinButton");
      const orbitButton = document.getElementById("orbitButton");
      const zoomRange = document.getElementById("zoomRange");
      const speedRange = document.getElementById("speedRange");
      const sweepRange = document.getElementById("sweepRange");
      const tiltRange = document.getElementById("tiltRange");
      const zoomValue = document.getElementById("zoomValue");
      const speedValue = document.getElementById("speedValue");
      const sweepValue = document.getElementById("sweepValue");
      const tiltValue = document.getElementById("tiltValue");
      const zoomOutButton = document.getElementById("zoomOutButton");
      const zoomInButton = document.getElementById("zoomInButton");
      const controls = document.querySelector(".controls");

	      function defaultZoom() {
	        return window.innerWidth < 760 ? -300 : -210;
	      }

      function defaultPose() {
        return { rx: Number(tiltRange.value), ry: 0 };
      }

      const pose = defaultPose();
      const state = {
        rx: pose.rx,
        ry: pose.ry,
        targetRx: pose.rx,
        targetRy: pose.ry,
        zoom: defaultZoom(),
        velocityX: 0,
        velocityY: 0,
        dragging: false,
        spinning: true,
        spinSpeed: Number(speedRange.value) / 100,
        spinArc: Number(sweepRange.value),
        spinCurrent: Number(speedRange.value) / 100,
        spinPhase: 0,
        orbiting: false,
        orbitStartRy: 0,
        orbitProgress: 0,
        lastX: 0,
        lastY: 0,
        lastTime: performance.now()
      };

      zoomRange.value = String(state.zoom);

      function applyTransform() {
        document.documentElement.style.setProperty("--rx", `${state.rx.toFixed(2)}deg`);
        document.documentElement.style.setProperty("--ry", `${state.ry.toFixed(2)}deg`);
        document.documentElement.style.setProperty("--zoom", `${state.zoom.toFixed(0)}px`);
      }

      function updateReadouts() {
        speedValue.textContent = `${Math.round(state.spinSpeed * 100)}%`;
        sweepValue.textContent = `${Math.round(state.spinArc)} deg`;
        zoomValue.textContent = `${Math.round(state.zoom)}`;
        tiltValue.textContent = `${Math.round(Number(tiltRange.value))} deg`;
      }

      function setZoom(value) {
        state.zoom = clamp(value, Number(zoomRange.min), Number(zoomRange.max));
        zoomRange.value = String(Math.round(state.zoom));
        updateReadouts();
        applyTransform();
      }

      function setSpeed(value) {
        state.spinSpeed = clamp(value, Number(speedRange.min), Number(speedRange.max)) / 100;
        speedRange.value = String(Math.round(state.spinSpeed * 100));
        updateReadouts();
        if (!state.spinning && !state.orbiting) setSpinActive(true);
      }

      function setSweep(value) {
        state.spinArc = clamp(value, Number(sweepRange.min), Number(sweepRange.max));
        sweepRange.value = String(Math.round(state.spinArc));
        updateReadouts();
      }

      function setTilt(value) {
        tiltRange.value = String(Math.round(clamp(value, Number(tiltRange.min), Number(tiltRange.max))));
        updateReadouts();
      }

	      function updateOrbitButton() {
	        const compact = window.innerWidth < 480;
	        orbitButton.textContent = state.orbiting ? (compact ? "Stop" : "Stop 360") : (compact ? "360" : "360 Orbit");
	        orbitButton.setAttribute("aria-pressed", state.orbiting ? "true" : "false");
	      }

      function setSpinActive(active) {
        state.spinning = active;
        spinButton.textContent = active ? "Pause" : "Spin";
        spinButton.setAttribute("aria-pressed", active ? "true" : "false");
        if (active) {
          state.orbiting = false;
          state.orbitProgress = 0;
          state.velocityX = 0;
          state.velocityY = 0;
          state.spinPhase = 0;
          state.targetRy = defaultPose().ry;
          updateOrbitButton();
        }
      }

      function resetScene() {
        const next = defaultPose();
        state.targetRx = next.rx;
        state.targetRy = next.ry;
        state.velocityX = 0;
        state.velocityY = 0;
        state.spinPhase = 0;
        state.orbiting = false;
        state.orbitProgress = 0;
        updateOrbitButton();
        setZoom(defaultZoom());
      }

	      function startOrbit360() {
	        const next = defaultPose();
	        state.dragging = false;
	        state.spinning = false;
	        state.orbiting = true;
	        state.orbitStartRy = next.ry;
	        state.orbitProgress = 0;
	        state.rx = next.rx;
	        state.ry = next.ry;
	        state.targetRx = next.rx;
	        state.targetRy = next.ry;
	        state.velocityX = 0;
	        state.velocityY = 0;
	        spinButton.textContent = "Spin";
	        spinButton.setAttribute("aria-pressed", "false");
	        applyTransform();
	        updateOrbitButton();
	      }

      function stopOrbit360() {
        state.orbiting = false;
        state.orbitProgress = 0;
        state.spinning = false;
        state.targetRy = state.ry;
        state.velocityX = 0;
        state.velocityY = 0;
        spinButton.textContent = "Spin";
        spinButton.setAttribute("aria-pressed", "false");
        updateOrbitButton();
      }

      viewer.addEventListener("pointerdown", (event) => {
        if (event.target.closest(".controls")) return;
        state.dragging = true;
        state.spinning = false;
        state.orbiting = false;
        spinButton.textContent = "Spin";
        spinButton.setAttribute("aria-pressed", "false");
        updateOrbitButton();
        state.lastX = event.clientX;
        state.lastY = event.clientY;
        viewer.setPointerCapture(event.pointerId);
      });

      viewer.addEventListener("pointermove", (event) => {
        if (!state.dragging) return;
        const dx = event.clientX - state.lastX;
        const dy = event.clientY - state.lastY;
        state.lastX = event.clientX;
        state.lastY = event.clientY;
        state.targetRy += dx * .28;
        state.targetRx = clamp(state.targetRx - dy * .2, -54, 30);
        state.velocityY = dx * .075;
        state.velocityX = -dy * .052;
      });

      viewer.addEventListener("pointerup", (event) => {
        state.dragging = false;
        try {
          viewer.releasePointerCapture(event.pointerId);
        } catch (_) {}
      });

      viewer.addEventListener("pointercancel", () => {
        state.dragging = false;
      });

      viewer.addEventListener("wheel", (event) => {
        event.preventDefault();
        setZoom(state.zoom - event.deltaY * .28);
      }, { passive: false });

      for (const eventName of ["pointerdown", "pointermove", "pointerup", "pointercancel", "wheel"]) {
        controls.addEventListener(eventName, (event) => {
          event.stopPropagation();
        }, { passive: eventName !== "wheel" });
      }

      frontButton.addEventListener("pointerdown", (event) => {
        event.preventDefault();
        event.stopPropagation();
        resetScene();
      });

      spinButton.addEventListener("pointerdown", (event) => {
        event.preventDefault();
        event.stopPropagation();
        setSpinActive(!state.spinning);
      });

      orbitButton.addEventListener("pointerdown", (event) => {
        event.preventDefault();
        event.stopPropagation();
        if (state.orbiting) stopOrbit360();
        else startOrbit360();
      });

      zoomRange.addEventListener("input", () => setZoom(Number(zoomRange.value)));
      speedRange.addEventListener("input", () => setSpeed(Number(speedRange.value)));
      sweepRange.addEventListener("input", () => setSweep(Number(sweepRange.value)));
      tiltRange.addEventListener("input", () => setTilt(Number(tiltRange.value)));
      zoomOutButton.addEventListener("pointerdown", (event) => {
        event.preventDefault();
        event.stopPropagation();
        setZoom(state.zoom - 34);
      });
      zoomInButton.addEventListener("pointerdown", (event) => {
        event.preventDefault();
        event.stopPropagation();
        setZoom(state.zoom + 34);
      });

      document.querySelectorAll("[data-speed]").forEach((button) => {
        button.addEventListener("pointerdown", (event) => {
          event.preventDefault();
          event.stopPropagation();
          setSpeed(Number(button.dataset.speed));
        });
      });

      document.querySelectorAll("[data-zoom]").forEach((button) => {
        button.addEventListener("pointerdown", (event) => {
          event.preventDefault();
          event.stopPropagation();
          setZoom(Number(button.dataset.zoom));
        });
      });

      function animate() {
        const now = performance.now();
        const dt = Math.min(32, now - state.lastTime) / 16.67;
        state.lastTime = now;

        if (!state.dragging && state.orbiting) {
          const next = defaultPose();
          const orbitSpeed = .0011 * clamp(state.spinSpeed, .36, 1.6);
          state.spinCurrent += (state.spinSpeed - state.spinCurrent) * .045;
          state.orbitProgress = Math.min(1, state.orbitProgress + orbitSpeed * (.76 + state.spinCurrent * .19) * dt);
	          const eased = .5 - Math.cos(state.orbitProgress * Math.PI) / 2;
          state.targetRx += (clamp(next.rx + Math.sin(eased * Math.PI * 2) * 1.6, -14, 9) - state.targetRx) * .08;
          state.targetRy = state.orbitStartRy - eased * 360;
          if (state.orbitProgress >= 1) {
            state.orbiting = false;
            updateOrbitButton();
            setSpinActive(true);
          }
        } else if (!state.dragging && state.spinning) {
          const next = defaultPose();
          const breath = .9 + (Math.sin(now * .00044) + 1) * .06;
          state.spinCurrent += (state.spinSpeed - state.spinCurrent) * .035;
          state.spinPhase += .0126 * breath * state.spinCurrent * dt;
          const pitchWave = Math.sin(now * .001) * 1.15 + Math.sin(now * .00043) * .62;
          state.targetRx += (clamp(next.rx + pitchWave, -14, 9) - state.targetRx) * .045;
          state.targetRy += (next.ry - Math.sin(state.spinPhase) * state.spinArc - state.targetRy) * .082;
        } else if (!state.dragging) {
          state.targetRx = clamp(state.targetRx + state.velocityX * dt, -54, 30);
          state.targetRy += state.velocityY * dt;
          state.velocityX *= .94;
          state.velocityY *= .94;
        }

	        state.rx += (state.targetRx - state.rx) * .12;
	        state.ry += (state.targetRy - state.ry) * .12;
	        applyTransform();
	        drawMesh(now);
	        drawAgents(now);
	        requestAnimationFrame(animate);
	      }

	      updateReadouts();
	      applyTransform();

	      const meshCanvas = document.getElementById("meshCanvas");
	      const agentCanvas = document.getElementById("agentCanvas");
      const meshCtx = meshCanvas.getContext("2d");
      const agentCtx = agentCanvas.getContext("2d");
	      const points = Array.from({ length: 42 }, (_, i) => ({
	        seed: i * 1.79,
	        side: i % 2 === 0 ? -1 : 1,
	        row: i % 7
	      }));
	      const seeded = (i, salt) => {
	        const value = Math.sin((i + 1) * 12.9898 + salt * 78.233) * 43758.5453;
	        return value - Math.floor(value);
	      };
	      const agents = Array.from({ length: 34 }, (_, i) => ({
	        t: seeded(i, 1) * Math.PI * 2,
	        r: 100 + seeded(i, 2) * 430,
	        speed: .0025 + seeded(i, 3) * .006,
	        phase: i * .47,
	        size: .8 + seeded(i, 4) * 2.4
	      }));

	      function resizeCanvases() {
	        const dpr = Math.min(window.devicePixelRatio || 1, window.innerWidth < 760 ? 1.35 : 1.75);
	        for (const canvas of [meshCanvas, agentCanvas]) {
	          canvas.width = Math.round(window.innerWidth * dpr);
	          canvas.height = Math.round(window.innerHeight * dpr);
          canvas.style.width = `${window.innerWidth}px`;
          canvas.style.height = `${window.innerHeight}px`;
        }
        meshCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
        agentCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }

	      window.addEventListener("resize", () => {
	        resizeCanvases();
	        updateOrbitButton();
	      });
      resizeCanvases();

      function drawMesh(time) {
        const w = window.innerWidth;
        const h = window.innerHeight;
        meshCtx.clearRect(0, 0, w, h);
        meshCtx.lineWidth = 1;

        for (const side of [-1, 1]) {
          const baseX = side < 0 ? -w * .07 : w * 1.07;
          const direction = side < 0 ? 1 : -1;
          for (let row = 0; row < 22; row += 1) {
            meshCtx.beginPath();
            for (let col = 0; col < 58; col += 1) {
              const x = baseX + direction * col * (w * .0135);
              const curve = Math.sin(col * .18 + time * .0011 + row * .24) * 22;
              const lift = Math.sin(col * .07 + time * .0007) * 30;
              const y = h * (.73 + row * .012) + curve + lift - Math.pow(col, 1.18) * .45;
              if (col === 0) meshCtx.moveTo(x, y);
              else meshCtx.lineTo(x, y);
            }
            const alpha = .08 + (row / 22) * .16;
            meshCtx.strokeStyle = `rgba(45, 75, 255, ${alpha})`;
            meshCtx.stroke();
          }
        }

        for (const point of points) {
          const sideX = point.side < 0 ? w * (.02 + point.row * .055) : w * (.96 - point.row * .053);
          const x = sideX + Math.cos(time * .0005 + point.seed) * 18;
          const y = h * (.12 + (point.seed % 1) * .72) + Math.sin(time * .0007 + point.seed) * 15;
          meshCtx.beginPath();
          meshCtx.fillStyle = `rgba(49, 84, 255, ${.18 + (point.row / 7) * .28})`;
          meshCtx.shadowColor = "rgba(49, 84, 255, .28)";
          meshCtx.shadowBlur = 14;
          meshCtx.arc(x, y, 3.2 + (point.row % 3), 0, Math.PI * 2);
          meshCtx.fill();
	          meshCtx.shadowBlur = 0;
	        }
	      }

      function drawAgents(time) {
        const w = window.innerWidth;
        const h = window.innerHeight;
        const cx = w * .38;
        const cy = h * .42;
        agentCtx.clearRect(0, 0, w, h);

        for (const agent of agents) {
          const angle = agent.t + time * agent.speed;
          const pulse = Math.sin(time * .002 + agent.phase) * .5 + .5;
          const x = cx + Math.cos(angle) * agent.r * (w < 760 ? .38 : .58);
          const y = cy + Math.sin(angle * 1.2) * agent.r * .23;
          const alpha = .1 + pulse * .34;
          agentCtx.beginPath();
          agentCtx.fillStyle = `rgba(42, 74, 255, ${alpha})`;
          agentCtx.shadowColor = "rgba(107, 231, 255, .58)";
          agentCtx.shadowBlur = 13;
          agentCtx.arc(x, y, agent.size, 0, Math.PI * 2);
          agentCtx.fill();

          if (agent.size > 1.7 && pulse > .64) {
            agentCtx.beginPath();
            agentCtx.strokeStyle = `rgba(42, 74, 255, ${alpha * .38})`;
            agentCtx.lineWidth = 1;
            agentCtx.moveTo(x, y);
            agentCtx.lineTo(cx + (x - cx) * .82, cy + (y - cy) * .82);
            agentCtx.stroke();
          }
	        }
	      }

	      requestAnimationFrame(animate);
	    })();
  </script>
</body>
</html>
